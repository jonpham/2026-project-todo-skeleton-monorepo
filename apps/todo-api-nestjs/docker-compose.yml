services:
  todo-api:
    build: .
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=file:./dev.db
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
      - NODE_ENV=production
    # Reset the database to an empty state on every container start (including
    # `docker compose restart`), then boot the server.
    command: sh -c "node_modules/.bin/prisma migrate reset --force --skip-seed && node dist/main"
