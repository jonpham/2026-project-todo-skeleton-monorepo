server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker and Workbox runtime: must never be cached so PWA updates
    # are detected immediately. These files are at fixed paths (no content hash).
    location ~* (sw\.js|workbox-[^/]+\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Static assets with content-hash filenames: cache aggressively.
    # Vite appends a content hash to all assets in dist/assets/, so a new
    # build always produces new filenames — stale cache is never a problem.
    location ~* \.(?:js|css|woff2?|ico|png|svg|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: all unmatched routes → index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
