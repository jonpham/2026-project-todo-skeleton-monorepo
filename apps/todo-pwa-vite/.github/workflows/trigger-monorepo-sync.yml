name: Trigger Monorepo Sync

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch repository event to monorepo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MONOREPO_PAT }}
          repository: jonpham/2026-project-todo-skeleton-monorepo
          event-type: pwa-updated
