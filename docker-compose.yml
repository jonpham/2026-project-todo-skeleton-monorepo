services:
  todo-pwa:
    build:
      # Context must be the repo root so pnpm can resolve workspace dependencies
      # (needs pnpm-workspace.yaml, pnpm-lock.yaml, and root package.json).
      context: .
      dockerfile: apps/todo-pwa/Dockerfile
    ports:
      - "3000:80"
    healthcheck:
      # nginx:alpine ships wget but not curl
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
