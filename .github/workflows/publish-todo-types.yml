name: Publish todo-types

on:
  push:
    branches: [main]
    paths:
      - "packages/todo-types/**"

concurrency:
  group: publish-todo-types-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Lint · Test · Build · Publish
    runs-on: ubuntu-latest
    env:
      VERSION_RESERVATION_TAG_PREFIX: todo-types-reserved/${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@todo-skeleton"

      - name: Install todo-types dependencies
        run: pnpm install --filter @todo-skeleton/types... --frozen-lockfile --ignore-scripts

      - name: Lint package
        run: pnpm --filter @todo-skeleton/types lint

      - name: Test package
        run: pnpm --filter @todo-skeleton/types test

      - name: Build package
        run: pnpm --filter @todo-skeleton/types build

      - name: Check version reservation
        id: reservation
        run: |
          reservation_refs="$(git ls-remote --refs --tags origin "refs/tags/${VERSION_RESERVATION_TAG_PREFIX}/*" | awk '{print $2}')"

          if [ -z "$reservation_refs" ]; then
            echo "has_reservation=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          reservation_count="$(printf '%s\n' "$reservation_refs" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$reservation_count" -ne 1 ]; then
            echo "Expected exactly one reservation tag for ${GITHUB_SHA}, found ${reservation_count}." >&2
            printf '%s\n' "$reservation_refs" >&2
            exit 1
          fi

          reservation_ref="$(printf '%s\n' "$reservation_refs")"
          reserved_version="${reservation_ref#refs/tags/${VERSION_RESERVATION_TAG_PREFIX}/}"
          echo "has_reservation=true" >> "$GITHUB_OUTPUT"
          echo "version=${reserved_version}" >> "$GITHUB_OUTPUT"

      - name: Read latest published version
        id: latest
        if: steps.reservation.outputs.has_reservation != 'true'
        run: |
          stderr_file="$(mktemp)"
          if published_version="$(npm view @todo-skeleton/types version --registry https://npm.pkg.github.com 2>"$stderr_file")"; then
            :
          elif grep -Eq '(^npm error code E404\b|404 Not Found)' "$stderr_file"; then
            published_version=""
          else
            cat "$stderr_file" >&2
            rm -f "$stderr_file"
            exit 1
          fi
          rm -f "$stderr_file"
          echo "published_version=${published_version}" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Reserve package version
        id: reserve
        run: |
          if [ -n "${{ steps.reservation.outputs.version }}" ]; then
            version='${{ steps.reservation.outputs.version }}'
          elif [ -n "${{ steps.latest.outputs.published_version }}" ]; then
            version="$(node scripts/release/bump-todo-types-version.mjs --base-version '${{ steps.latest.outputs.published_version }}')"
          else
            version="$(node scripts/release/bump-todo-types-version.mjs)"
          fi

          if [ "${{ steps.reservation.outputs.has_reservation }}" != 'true' ]; then
            reservation_tag="${VERSION_RESERVATION_TAG_PREFIX}/${version}"
            git tag "${reservation_tag}" "${GITHUB_SHA}"
            git push origin "refs/tags/${reservation_tag}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check reserved version in registry
        id: registry
        run: |
          stderr_file="$(mktemp)"
          reserved_version='${{ steps.reserve.outputs.version }}'
          if published_version="$(npm view @todo-skeleton/types@"${reserved_version}" version --registry https://npm.pkg.github.com 2>"$stderr_file")"; then
            if [ "$published_version" != "$reserved_version" ]; then
              echo "Expected reserved version ${reserved_version}, got ${published_version}." >&2
              rm -f "$stderr_file"
              exit 1
            fi
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          elif grep -Eq '(^npm error code E404\b|404 Not Found)' "$stderr_file"; then
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          else
            cat "$stderr_file" >&2
            rm -f "$stderr_file"
            exit 1
          fi
          rm -f "$stderr_file"
          echo "version=${reserved_version}" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set reserved package version
        if: steps.registry.outputs.already_published != 'true'
        run: |
          node -e 'const fs=require("fs"); const path="packages/todo-types/package.json"; const version=process.argv[1]; const pkg=JSON.parse(fs.readFileSync(path,"utf8")); pkg.version=version; fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);' "${{ steps.reserve.outputs.version }}"

      - name: Publish package
        if: steps.registry.outputs.already_published != 'true'
        run: pnpm --dir packages/todo-types publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write skipped summary
        if: steps.registry.outputs.already_published == 'true'
        run: |
          echo "## todo-types publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Skipped: reserved version ${{ steps.registry.outputs.version }} for commit ${GITHUB_SHA} is already present in the registry." >> "$GITHUB_STEP_SUMMARY"

      - name: Write job summary
        if: steps.registry.outputs.already_published != 'true'
        run: |
          echo "## todo-types publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | @todo-skeleton/types |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ steps.reserve.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | https://npm.pkg.github.com |" >> "$GITHUB_STEP_SUMMARY"
