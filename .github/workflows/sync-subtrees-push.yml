name: Sync — Push Subtrees to Upstream

on:
  push:
    branches: [main]
    paths:
      - "apps/todo-pwa-vite/**"
      - "apps/todo-api-nestjs/**"

concurrency:
  group: sync-subtrees-push
  cancel-in-progress: false

jobs:
  push-pwa:
    name: Push PWA subtree → todo-pwa-vite
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add PWA remote
        run: |
          git remote add todo-pwa-vite \
            https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/jonpham/2026-project-todo-pwa-vite.git

      - name: Push PWA subtree
        run: |
          git subtree split --prefix=apps/todo-pwa-vite -b tmp-pwa-split
          git push todo-pwa-vite tmp-pwa-split:main --force-with-lease
          git branch -D tmp-pwa-split

  push-api:
    name: Push API subtree → todo-api-nestjs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add API remote
        run: |
          git remote add todo-api-nestjs \
            https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/jonpham/2026-project-todo-api-nestjs.git

      - name: Push API subtree
        run: |
          git subtree split --prefix=apps/todo-api-nestjs -b tmp-api-split
          git push todo-api-nestjs tmp-api-split:main --force-with-lease
          git branch -D tmp-api-split
