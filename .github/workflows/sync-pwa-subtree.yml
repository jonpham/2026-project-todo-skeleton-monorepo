name: Sync PWA Subtree

on:
  repository_dispatch:
    types: [pwa-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Create sync branch
        run: |
          BRANCH="chore/sync-pwa-vite-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "$BRANCH" >> /tmp/branch_name

      - name: Add subtree remote
        run: git remote add todo-pwa-vite https://github.com/jonpham/2026-project-todo-pwa-vite.git || true

      - name: Pull subtree update
        run: ./scripts/subtree-pull.sh todo-pwa-vite main

      - name: Push branch
        run: |
          BRANCH=$(cat /tmp/branch_name)
          git push -u origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "chore: sync apps/todo-pwa-vite from upstream main"
          title: "chore: sync PWA Vite subtree with latest changes"
          body: |
            Automated sync of `apps/todo-pwa-vite` subtree from upstream repository.

            This PR will:
            - Deploy preview to Cloudflare Pages
            - Run E2E tests against preview
            - Allow manual review before merging to production

            🤖 Triggered by PWA repo push to main
          branch: ${{ env.BRANCH }}
          base: main
          delete-branch: true
